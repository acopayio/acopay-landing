name: Sync markets data (GitHub backup)

# Primary collector = VPS → Contents API push (see scripts/vps-markets-sync.mjs).
# This workflow is a BACKUP only. Website never contacts VPS HTTP.

on:
  schedule:
    # Hourly backup if VPS sync is down
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-markets-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install undici
        run: npm install --no-save undici@^6.27.0

      - name: Sync Binance markets JSON
        env:
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
          MARKETS_SYNC_MS: "180000"
        run: node scripts/sync-binance-markets.mjs

      - name: Sync ACOPAY transfers 24h JSON
        env:
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}
          ACOPAY_MINT: 6Pcq8xnkVYxR42FEehXrucvaMB1fZYuqoR8B9FGSAS8F
          TRANSFERS_HISTORY_DAYS: "1"
        run: node scripts/sync-transfers.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/binance-markets.json public/data/transfers-24h.json
          if git diff --staged --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore: backup sync Binance + ACOPAY transfers 24h"
          git push
